<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Sistema</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h2>Sistema</h2>
            <a href="#">Dashboard</a>
            <a href="#">Cadastro</a>
            <a href="#">Relatórios</a>
        </aside>

        <main class="content">
            <header>
                <h1>Cadastro de Usuários</h1>
            </header>


            <!-- FORMULARIO DE CADASTRO -->
            <section class="card">
                <form onsubmit="cadastrar(event)">
                    <label for="nome">Nome: </label>
                    <input type="text" name="nome" id="nome" placeholder="Digite seu nome...">
                    <input type="email" name="email" id="email" placeholder="Digite seu email...">

                    <button type="submit">Cadastrar</button>
                </form>
            </section>

            <!-- LISTA DE USUARIO CADASTRADOS -->
            <section class="card">
                <h1>Usuários Cadastrados: <span id="userCount">0</span></h1>
                <ul id="lista"></ul>
                <h1> <span></span></h1>
            </section>
        </main>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
